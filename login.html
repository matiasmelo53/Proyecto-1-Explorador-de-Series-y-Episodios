<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso</title>
</head>
<body>
    <div style="width: 100%;">
        <div id="Barra de Navegación" style="background-color: black; color: white;"><!--Barra navegación superior, con tablas y pre-css-->
            <div id="superior">
                <table>
                    <tr>
                        <td width="83%"> 
                            <div >
                                <a href="index.html">
                                    <img src="media/Logo[El Mejor].jpg" alt="Logo Neflis2" width="125px">
                                </a>
                            </div>
                        </td>
                        <td ></td>
                        <td width="17%">
                            <div  style="justify-content: right;">
                                <button type="button" style="background-color: white; color: black; width: 35%;"><a href="login.html">Inscribirse</a></button>
                                <button type="button" style="background-color: white; color: black; width: 35%; ">Ingresar</button>
                            </div>
                        </td>
                    </tr>
                </table>
            </div>
            <div id="inferior" style="justify-content: left; padding-left: 1%; padding-bottom: 0.5%;">
                <a href="index.html" style="color: white;">Inicio</a>|<a href="#" style="color: white;" >Acerca de</a>
            </div>
        </div>
        <div class="form">
            <table style="margin-top: 2%; margin-left: 20%; padding: 1%; border: 1px solid black;" >
                <form >
                    <tr>
                        <td align="left" style="margin-left: 20%; padding-bottom: 1%;" >
                            <label for="nombre">Apodo:</label>
                            
                        </td>
                        <td style="padding-bottom: 1%;">
                            <input type="text" name="nombre" placeholder="Cato212" size="70%">
                        </td>
                    </tr>
                    <tr>
                        <td align="left" style="margin-left: 20%;padding-bottom: 1%;">
                            <label for="email">Email:</label>
                        </td>
                        <td style="padding-bottom: 1%;">
                            <input type="email" id="email" placeholder="ejemplo@ejemplo.com" size="70%">

                        </td>
                    </tr>
                    <tr>
                        <td align="left" style="margin-left: 20%;padding-bottom: 1%;">
                            <label for="password">Contraseña:</label>
                        </td>
                        <td style="padding-bottom: 1%;">
                            <input type="password" id="password" size="70%">

                        </td>
                    </tr>
                    
                    <tr>
                        <td align="left"  style="margin-left: 20%;padding-bottom: 1%;" > 
                            <label for="genero" >Sexo:</label> 
                        </td>
                        <td align="left" style="padding-bottom: 1%;" >
                            <input type="radio" id="G1" name="genero" value="mars"> 
                            <label for="G1">Masculino</label><br>
                            <input type="radio" id="G2" name="genero" value="venus" >
                            <label for="G2">Feminino</label><br>
                            <input type="radio" id="G3" name="genero" value="jupiter">
                            <label for="G3">Otro</label><br>
                        </td>
                    </tr>
                    <tr>
                        <td align="left" style="margin-left: 2%;padding-bottom: 1%;">
                            <label>
                                Género Favorito:
                            </label>
                        </td>

                        <td align="left" style="margin-left: 2%;padding-bottom: 1%;">
                            <input type="checkbox" id="A1" name="area" value="twi">
                            <label for="A1">Horror</label><br>
                            <input type="checkbox" id="A2" name="area" value="hutt">
                            <label for="A2">Romance</label><br>
                            <input type="checkbox" id="A3" name="area" value="Humano">
                            <label for="A3">Comedia</label><br>
                            <input type="checkbox" id="A4" name="area" value="Mir">
                            <label for="A4">Acción</label><br>
                            <input type="checkbox" id="A5" name="area" value="Mir">
                            <label for="A5">Otro</label><br>
                        </td>
                    </tr>
                </form>
            </table>
                    


        </div>

    </div>
</body>
</html>
