<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso</title>
</head>

<body style="font-family:Georgia, 'Times New Roman', Times, serif; background-color: #00B0D3;">
    <div width="100%">
        <div id="Barra de Navegación" style="background-color: black; color: white;"><!--Barra navegación superior, con tablas y pre-css-->
            <div id="superior">
                <table style="padding: 10px;">
                    <tr>
                        <td width="20%"> 
                            <div >
                                <a href="index.html">
                                    <img src="media/logoPlaceholder.png" alt="Logo FilmLogs" width="175px">
                                </a>
                            </div>
                        </td>

                        <td width="67%">
                            <div style="justify-content:space-evenly;">
                                <form>
                                    <button type="submit" style="background-color: white; color: black; border-color: black; box-shadow: 5px 5px #FFFE00; height: 39px;">Buscar</button>
                                    <input type="text" id="busqueda" name="busqueda" placeholder="Busqueda" style="margin-left:20px; height: 25px; padding: 5px; padding-left: 15px; width: 80%; border-color: black; box-shadow: 5px 5px #FFFE00;">
                                </form>
                            </div>
                        </td>
                        
                        <td width="20%">
                            <div  style="justify-content: right;">
                                <button type="button" style="background-color: black; color: white; border-color: white; box-shadow: 5px 5px #FFFE00; height: 39px;">Inscribirse</button>
                                <button type="button" style="margin-left:20px; background-color: black; color: white; border-color: white; box-shadow: 5px 5px #FFFE00; height: 39px;">Ingresar</button>
                                <a href="perfil.html">
                                    <img src="media/usuarioPlaceholder.png" style="margin-left:20px; height: 39px; border-style: solid; border-color: black; box-shadow: 5px 5px #FFFE00;">
                                </a>
                            </div>
                        </td>
                    </tr>
                </table>
            </div>
        </div>

        <div id="Cuerpo" width="90%" style="padding-left: 0.5%; padding-right: 0.5%; text-align: center;">
            <form class='login-form'>
                <fieldset style="margin:10%;padding: 5%; background-color:#FFFE00; border-radius: 20px;">
                    <div class="flex-row">
                        <h1>Iniciar Sesion</h1>
                    </div>
                    <div class="flex-row">
                        <label class="lf--label" for="username">
                            <svg x="0px" y="0px" width="15px" height="13px">
                            <path fill="#000" d="M8.9,7.2C9,6.9,9,6.7,9,6.5v-4C9,1.1,7.9,0,6.5,0h-1C4.1,0,3,1.1,3,2.5v4c0,0.2,0,0.4,0.1,0.7 C1.3,7.8,0,9.5,0,11.5V13h12v-1.5C12,9.5,10.7,7.8,8.9,7.2z M4,2.5C4,1.7,4.7,1,5.5,1h1C7.3,1,8,1.7,8,2.5v4c0,0.2,0,0.4-0.1,0.6 l0.1,0L7.9,7.3C7.6,7.8,7.1,8.2,6.5,8.2h-1c-0.6,0-1.1-0.4-1.4-0.9L4.1,7.1l0.1,0C4,6.9,4,6.7,4,6.5V2.5z M11,12H1v-0.5 c0-1.6,1-2.9,2.4-3.4c0.5,0.7,1.2,1.1,2.1,1.1h1c0.8,0,1.6-0.4,2.1-1.1C10,8.5,11,9.9,11,11.5V12z"/>
                            </svg>
                        </label>
                        <input id="username" class='lf--input' placeholder='Nombre de usuario' type='text' required style="width: 300px;">
                    </div>
                    <br>
                    <div class="flex-row">
                        <label class="lf--label" for="password">
                            <svg x="0px" y="0px" width="15px" height="8px">
                            <g>
                                <path fill="#000" d="M6,2L6,2c0-1.1-1-2-2.1-2H2.1C1,0,0,0.9,0,2.1v0.8C0,4.1,1,5,2.1,5h1.7C5,5,6,4.1,6,2.9V3h5v1h1V3h1v2h1V3h1 V2H6z M5.1,2.9c0,0.7-0.6,1.2-1.3,1.2H2.1c-0.7,0-1.3-0.6-1.3-1.2V2.1c0-0.7,0.6-1.2,1.3-1.2h1.7c0.7,0,1.3,0.6,1.3,1.2V2.9z"/>
                            </g>
                            </svg>
                        </label>
                        <input id="password" class='lf--input' placeholder='Contraseña' type='password' required style="width: 300px;">
                    </div>
                    <br>
                    <input class='lf--submit' type='submit' value='Iniciar Sesion'>
                    <br>
                </fieldset>
            </form>
            <br>
            <a class='lf--forgot' href='#'>Olvidaste tu contraseña?</a>
        </div>

        <div id="footer" style="height: 120px; width: 100%; background-color: black; color: white; margin-top: 1%; ">
            <table>
                <tr style="height: 10%;">
                    <td style="width: 60%;">
                        <ul style="list-style: none;"><li><h3>Contacto</h3></li></ul>
                    </td>
                    <td>
                        <ul style="list-style: none;"><li><h3>Sobre Nosotros</h3></li></ul>
                    </td>
                </tr>
                <tr style="margin-top: 0%;">
                    <td style="width: 60%;">
                        <ul style="list-style: none;">
                            <li>Matías</li>
                            <li>Nube</li>
                        </ul>
                    </td>
                    <td></td>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>
