<!DOCTYPE html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Galeria</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css" type="text/css">
    <link rel="stylesheet" href="css/mp3player.css" type="text/css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script defer src="js/main.js"></script>
    <script defer src="js/mp3player.js"></script>
    <script defer src="js/iniciosesion.js"></script>
    <script src="http://code.jquery.com/jquery-latest.js"></script>

</head>

<body>

    <div id = "showImage"></div>
    <div id = "showID"></div>
    <div id = "showName"></div>
    <div id = "showCount"></div>
    <p id="usuarioFecha"></p>
    <script>
        const date = new Date();
        let fecha = `${date.getDate()} / ${date.getMonth()+1} / ${date.getFullYear()}`  
        document.getElementById("usuarioFecha").innerHTML = "Se unio el " + fecha;
    </script>

    <div class = "container-fluid">
        <div class="row row-cols-2 row-cols-lg-5 g-2 g-lg-3" id="allShows"></div>
    </div>

    <script>
        fetch("https://api.tvmaze.com/shows/1")
        //.then(res => console.log(result))
        .then(response => response.json())
        .then(res => {
            let image = document.getElementById("showImage");
            let id = document.getElementById("showID");
            let name = document.getElementById("showName");

            image.innerHTML = `<img src="${res.image.medium}">`;
            id.innerHTML = `<p>${res.id}</p>`;
            name.innerHTML = `<h1>${res.name}</h1>`;
        })
        .catch(error => {console.log(error)});

        fetch("https://api.tvmaze.com/shows")
        .then(response => response.json())
        .then(res => {
            let shows = document.getElementById("allShows");
            let showcount = 0;
            res.forEach(show => {
                showcount++;
                shows.innerHTML +=
                `<div class="col">
                    <div class="card p-3" style="width: 18rem; height:30rem;">
                        <div class="card-body text-center">
                            <div class="card-title" style="font-size:1.5rem;">${show.name}</div>
                            <img class="card-text" src="${show.image.medium}">
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById("showCount").innerHTML = showcount;
                
        })
        .catch(error => {console.log(error)})
    </script>

</body>
