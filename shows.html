                                </a>
                            </div>
                        </td>
                        <td ></td>
                        <td width="15%">
                            <div  style="justify-content: right;">
                                <a href="signin.html">
                                <button type="button" style="background-color: black; color: white; border-color: white; box-shadow: 5px 5px #FFFE00; height: 39px;">Inscribirse</button>
                                </a>
                                
                                <a href="login.html">
                                <button type="button" style="margin-left:20px; background-color: black; color: white; border-color: white; box-shadow: 5px 5px #FFFE00; height: 39px;">Ingresar</button>

                                <a href="perfil.html">

                                </a>
                            </div>
                        </td>
                    </tr>
                </table>
            </div>
            <div id="inferior" style="justify-content: left; padding-left: 1%; padding-bottom: 0.5%;">
                <a href="index.html" style="color: white;">Inicio</a>|<a href="#" style="color: white;" >Acerca de</a>
            </div>

        <div id="Cuerpo" width="90%" style="padding-left: 0.5%; padding-right: 0.5%;">
            <!--Pelicula actual, img, texto-->
            <table style="padding-top: 1%;">
                <tr>
                    <td rowspan="3" width="30%">
                        <div class="img" style="justify-content: left; padding-top: 1%;"><img src="media/placeHolder.jpg" class="caratula" alt="Solo un cuadro negro"  width="100%"></div>
                    </td>
                    <td width="70%"><div class="titulo" style="text-align: left; margin-left: 5%;"><h1>Titulo de Pelicula</h1></div></td>
                </tr>
                <tr>
                    <td><div id="showGenero" style="margin-left: 5%; font-size: 20px;">Genero:</div></td>
                </tr>
                <tr>
                    <td><div id="showDesc" style="margin-left: 5%; font-size: 20px;">Sinopsis:</div></td>
                </tr>
            </table> 
            <div class="slider">
                <!--Muestra los ep asociados a la imagen actual.podría ser un slider boostrap, cada recuadro se añade por javascrypt-->
                <table>
                    <tr><td><h3>Episodios</h3></td></tr>
                    <tr style="justify-content: right;">
                        <td style=" align-items: center; " ><img src="media/placeHolder.jpg" alt="Solo un cuadro negro" width="50%"></td>
                        <td style=" align-items: center; " ><img src="media/placeHolder.jpg" alt="Solo un cuadro negro" width="50%"></td>
                        <td style=" align-items: center; " ><img src="media/placeHolder.jpg" alt="Solo un cuadro negro" width="50%"></td>

                        <td style=" align-items: center; " ><img src="media/placeHolder.jpg" alt="Solo un cuadro negro" width="50%"></td>
                        <td style=" align-items: center; " ><img src="media/placeHolder.jpg" alt="Solo un cuadro negro" width="50%"></td>
                    </tr>
                </table>
            </div>
            <!--Formulario para recibir el comentario-->
            <div id="comentario">
                <table width="100%" height="300px">
                    <tr>
                        <td style="text-align: left;">
                            <h3>Comentarios</h3>
                        </td>
                    </tr>
                    <tr>
                        <td style="border: 2px solid black;">
                            <form action="#" target="_blank" style="padding:2%;">
                                <table>
                                    <tr>
                                        <td rowspan="2">
                                            <img src="media/usuarioPlaceholder.png" style="height: 39px; border-style: solid; border-color: black; box-shadow: 5px 5px #FFFE00; margin-right: 10px;">
                                        </td>
                                        
                                        <td>
                                            <div id="usuarioNombre" style="font-size: 20px;">Usuario</div>
                                        </td>
                                    </tr>

                                    <tr>
                                        <td style="width:30%">
                                            Rating personal:
                                            <input type="radio" id="rating1" name="rating" value="1" required><label for="rating1">1</label>
                                            <input type="radio" id="rating2" name="rating" value="2"><label for="rating2">2</label>
                                            <input type="radio" id="rating3" name="rating" value="3"><label for="rating3">3</label>
                                            <input type="radio" id="rating4" name="rating" value="4"><label for="rating4">4</label>
                                            <input type="radio" id="rating5" name="rating" value="5"><label for="rating5">5</label>
                                        </td>
                                        
                                        <td style="width:80%">
                                            <button type="submit">Enviar</button>
                                        </td>
                                    </tr>

                                    <tr>
                                        <td colspan="3">
                                            <label for="comentario"></label>
                                            <textarea style="width: 98%; height: 100px;" name="comentario"></textarea>
                                        </td>
                                    </tr>
                                </table>
                                
                            </form>
                        </td>
                    </tr>
                </table>
            </div>
            
        </div>
