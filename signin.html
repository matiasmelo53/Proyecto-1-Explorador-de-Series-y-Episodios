        <div class="form" style="margin-top: 5%; margin-bottom: 5%;">
            <table style="margin-top: 2%; justify-self: center; padding: 10px; width: 70%; border: 1px solid black; box-shadow: 5px 5px black; background-color: #00b0d4; color: #FCFAEE; padding-left: 20%; padding-right: 20%;">
                <form>
                    <tr>
                        <td colspan="2">
                            <h1 style="font-size: 50px; color: #FCFAEE; text-shadow: 2px 2px black;">Crear Cuenta</h1>
                            <p style="font-size: 20px;">Unete y reseña!</p>
                        </td>
                    </tr>
                    <tr>
                        <td align="left" style="margin-left: 20%; padding-bottom: 1%;" >
                            <label for="nombre">Apodo:</label>
                            
                        </td>
                        <td style="padding-bottom: 1%;">
                            <input type="text" name="nombre" placeholder="Cato212" size="100%" style="height: 25px;">
                        </td>
                    </tr>
                    <tr>
                        <td align="left" style="margin-left: 20%;padding-bottom: 1%;">
                            <label for="email">Email:</label>
                        </td>
                        <td style="padding-bottom: 1%;">
                            <input type="email" id="email" placeholder="ejemplo@ejemplo.com" size="100%" style="height: 25px;">

                        </td>
                    </tr>
                    <tr>
                        <td align="left" style="margin-left: 20%;padding-bottom: 1%;">
                            <label for="password">Contraseña:</label>
                        </td>
                        <td style="padding-bottom: 1%;">
                            <input type="password" id="password" size="100%" style="height: 25px;">

                        </td>
                    </tr>
                    
                    <tr>
                        <td align="left"  style="margin-left: 20%;padding-bottom: 1%;" > 
                            <label for="genero" >Sexo:</label> 
                        </td>
                        <td align="left" style="padding-bottom: 1%;" >
                            <input type="radio" id="G1" name="genero" value="mars"> 
                            <label for="G1">Masculino</label><br>
                            <input type="radio" id="G2" name="genero" value="venus" >
                            <label for="G2">Feminino</label><br>
                            <input type="radio" id="G3" name="genero" value="jupiter">
                            <label for="G3">Otro</label><br>
                        </td>
                    </tr>
                    <tr>
                        <td align="left" style="margin-left: 2%;padding-bottom: 1%;">
                            <label>
                                Género Favorito:
                            </label>
                        </td>

                        <td align="left" style="margin-left: 2%;padding-bottom: 1%;">
                            <input type="checkbox" id="A1" name="area" value="Horror">
                            <label for="A1">Horror</label><br>
                            <input type="checkbox" id="A2" name="area" value="Romance">
                            <label for="A2">Romance</label><br>
                            <input type="checkbox" id="A3" name="area" value="Comedia">
                            <label for="A3">Comedia</label><br>
                            <input type="checkbox" id="A4" name="area" value="Accion">
                            <label for="A4">Acción</label><br>
                            <input type="checkbox" id="A5" name="area" value="sci-fi">
                            <label for="A5">Ciencia Ficción</label><br>
                            <input type="checkbox" id="A6" name="area" value="Otro">
                            <label for="A6">Otro</label><br>
                        </td>
                    </tr>
                    <tr>
                        <td>
                        </td>
                        <td align="right">
                            <button type="submit" style="margin-left:20px; background-color: black; color: white; border-color: white; box-shadow: 5px 5px #FFFE00; height: 39px;">Enviar</button>
                            <button  type="reset" style="margin-left:20px; background-color: black; color: white; border-color: white; box-shadow: 5px 5px #FFFE00; height: 39px;">Borrar</button>
                        </td>
                    </tr>
