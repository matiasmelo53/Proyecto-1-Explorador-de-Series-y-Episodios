    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmLogs - Inscripcion </title>
</head>
<body style="font-family:Georgia, 'Times New Roman', Times, serif">
    <div style="width: 100%;">
        <div id="Barra de Navegación" style="background-color: black; color: white;"><!--Barra navegación superior, con tablas y pre-css-->
            <div id="superior">
                <table style="padding: 10px;">
                    <tr>
                        <td width="85%"> 
                            <div >
                                <a href="index.html">
                                    <img src="media/logoPlaceholder.png" alt="Logo FilmLogs" width="175px">
                                </a>
                            </div>
                        </td>
                        <td ></td>
                        <td width="15%">
                            <div  style="justify-content: right;">
                                <a href="signin.html">
                                <button type="button" style="background-color: black; color: white; border-color: white; box-shadow: 5px 5px #FFFE00; height: 39px;">Inscribirse</button>
                                </a>
                                
                                <a href="login.html">
                                <button type="button" style="margin-left:20px; background-color: black; color: white; border-color: white; box-shadow: 5px 5px #FFFE00; height: 39px;">Ingresar</button>
                                </a>

                                <a href="perfil.html">
                                    <img src="media/usuarioPlaceholder.png" style="margin-left:20px; height: 39px; border-style: solid; border-color: black; box-shadow: 5px 5px #FFFE00;">
                                </a>
                            </div>
                        </td>
                    </tr>
                </table>
            </div>
            <div id="inferior" style="justify-content: left; padding-left: 1%; padding-bottom: 0.5%;">
                <a href="index.html" style="color: #FFFE00;">Inicio</a> | <a href="#" style="color: #FFFE00;" >Acerca de</a>
            </div>
        </div>
        <div class="form" style="margin-top: 5%; margin-bottom: 5%;">
            <table style="margin-top: 2%; justify-self: center; padding: 1%; width: 70%; border: 1px solid black; box-shadow: 5px 5px black; background-color: #00b0d4; color: #FCFAEE; padding-left: 20%; padding-right: 20%;">
                <form>
                    <tr>
                        <td colspan="2">
                            <h1 style="font-size: 50px; color: #FCFAEE; text-shadow: 2px 2px black;">Crear Cuenta</h1>
                            <p style="font-size: 20px;">Unete y reseña!</p>
                        </td>
                    </tr>
                    <tr>
                        <td align="left" style="margin-left: 20%; padding-bottom: 1%;" >
                            <label for="nombre">Apodo:</label>
                            
                        </td>
                        <td style="padding-bottom: 1%;">
                            <input type="text" name="nombre" placeholder="Cato212" size="100%" style="height: 25px;">
                        </td>
                    </tr>
                    <tr>
                        <td align="left" style="margin-left: 20%;padding-bottom: 1%;">
                            <label for="email">Email:</label>
                        </td>
                        <td style="padding-bottom: 1%;">
                            <input type="email" id="email" placeholder="ejemplo@ejemplo.com" size="100%" style="height: 25px;">

                        </td>
                    </tr>
                    <tr>
                        <td align="left" style="margin-left: 20%;padding-bottom: 1%;">
                            <label for="password">Contraseña:</label>
                        </td>
                        <td style="padding-bottom: 1%;">
                            <input type="password" id="password" size="100%" style="height: 25px;">

                        </td>
                    </tr>
                    
                    <tr>
                        <td align="left"  style="margin-left: 20%;padding-bottom: 1%;" > 
                            <label for="genero" >Sexo:</label> 
                        </td>
                        <td align="left" style="padding-bottom: 1%;" >
                            <input type="radio" id="G1" name="genero" value="mars"> 
                            <label for="G1">Masculino</label><br>
                            <input type="radio" id="G2" name="genero" value="venus" >
                            <label for="G2">Feminino</label><br>
                            <input type="radio" id="G3" name="genero" value="jupiter">
                            <label for="G3">Otro</label><br>
                        </td>
                    </tr>
                    <tr>
                        <td align="left" style="margin-left: 2%;padding-bottom: 1%;">
                            <label>
                                Género Favorito:
                            </label>
                        </td>

                        <td align="left" style="margin-left: 2%;padding-bottom: 1%;">
                            <input type="checkbox" id="A1" name="area" value="Horror">
                            <label for="A1">Horror</label><br>
                            <input type="checkbox" id="A2" name="area" value="Romance">
                            <label for="A2">Romance</label><br>
                            <input type="checkbox" id="A3" name="area" value="Comedia">
                            <label for="A3">Comedia</label><br>
                            <input type="checkbox" id="A4" name="area" value="Accion">
                            <label for="A4">Acción</label><br>
                            <input type="checkbox" id="A5" name="area" value="sci-fi">
                            <label for="A5">Ciencia Ficción</label><br>
                            <input type="checkbox" id="A6" name="area" value="Otro">
                            <label for="A6">Otro</label><br>
                        </td>
                    </tr>
                    <tr>
                        <td>
                        </td>
                        <td align="right">
                            <button type="submit" style="margin-left:20px; background-color: black; color: white; border-color: white; box-shadow: 5px 5px #FFFE00; height: 39px;">Enviar</button>
                            <button  type="reset" style="margin-left:20px; background-color: black; color: white; border-color: white; box-shadow: 5px 5px #FFFE00; height: 39px;">Borrar</button>
                        </td>
                    </tr>
                </form>
            </table>
        </div>

        <div id="footer" style="width: 100%; background-color: black; color: white; margin-top: 1%; padding:10px;">
            <table width="100%">
                <tr style="height: 10%;">
                    <td style="width: 60%;">
                        <ul style="list-style: none; color: #FFFE00;"><li><h2>Requieres de ayuda? Contactanos</h2></li></ul>
                    </td>
                </tr>
                <tr style="margin-top: 0%;">
                    <td style="width: 60%;">
                        <ul style="list-style: none; font-size: 20px;">
                            <li>
                            <a href="https://mail.google.com/mail/?view=cm&fs=1&to=matiasmelo3600@gmail.com&su=Sobre FilmLogs">
                                Matías Melo
                            </a></li><br>

                            <li>
                            <a>
                            Nube
                            </a></li>
                        </ul>
                    </td>
                </tr>

                <tr>
                    <td style="text-align: center;">
                        © FilmLogs. 2026
                    </td>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>
